<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <title>Read Ease - Virtual Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<body>

<!-- 🌊 Animated Background -->
<div class="background-animation"></div>

<div class="container">
    <h3 class="hero-text">
    Understand Anything. Instantly.
</h3>

    <div class="header">
        <div>
            <h1>Read Ease</h1>
            <h3 class="subheading">AI Virtual Assistant</h3>
        </div>

        <button onclick="toggleDarkMode()">🌙</button>
    </div>

    <p class="tagline">
        Your smart assistant for summarizing, explaining, and refining text.
    </p>

    <!-- MODE SELECT -->
  <div class="mode-cards">
    <div class="mode-card active" data-mode="summarize">📝 Summarize</div>
    <div class="mode-card" data-mode="explain">🧠 Explain</div>
    <div class="mode-card" data-mode="improve">✨ Improve</div>
    <div class="mode-card" data-mode="translate">🌍 Simplify</div>
</div>

    <!-- INPUT -->
    <textarea id="inputText"
        placeholder="Type, paste, or speak your text here..."
        maxlength="2000"
        oninput="updateCount(); autoResize(this)">
    </textarea>

    <div class="info-bar">
        <span id="charCount">Characters: 0 / 2000</span>
        <span id="wordCount">Words: 0</span>
    </div>

    <!-- BUTTONS -->
    <div class="button-group">
    <button class="btn-main" onclick="processText()">Generate</button>

    <button class="btn-voice" onclick="startVoice()">🎤 Speak</button>

    <button class="btn-voice" onclick="speakOutput()">🔊 Listen</button>

    <button class="btn-main" onclick="clearAll()">Clear</button>

    <button class="btn-main" onclick="copyResponse()">Copy</button>

    <button class="btn-main" onclick="downloadResponse()">Download</button>
</div>

    <!-- LOADER -->
    <div id="loader" class="thinking hidden">
        Assistant is thinking<span id="dots">.</span>
    </div>

    <!-- OUTPUT -->
    <div id="output" class="output-box">
        Assistant response will appear here...
    </div>

</div>

<script src="script.js"></script>
</body>
</body>
</html>
