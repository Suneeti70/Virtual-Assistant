<!DOCTYPE html>
<html>
<head>
    <title>Read Ease - Virtual Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="header">
        <div>
            <h1>Read Ease</h1>
            <h3 class="subheading">AI Virtual Assistant</h3>
        </div>

        <button onclick="toggleDarkMode()">🌙</button>
    </div>

    <p class="tagline">
        Your smart assistant for summarizing, explaining, and refining text.
    </p>

    <!-- MODE SELECT -->
    <div class="mode-selector">
        <select id="mode">
            <option value="summarize">Summarize</option>
            <option value="explain">Explain</option>
            <option value="improve">Improve Writing</option>
            <option value="translate">Translate to Simple English</option>
        </select>
    </div>

    <!-- INPUT TEXT -->
    <textarea
        id="inputText"
        placeholder="Type, paste, or speak your text here..."
        maxlength="2000"
        oninput="updateCount(); autoResize(this)">
    </textarea>

    <div class="info-bar">
        <span id="charCount">Characters: 0 / 2000</span>
        <span id="wordCount">Words: 0</span>
    </div>

    <!-- BUTTONS -->
    <div class="button-group">

        <button onclick="processText()">Generate</button>

        <button onclick="startVoice()">🎤 Speak</button>

        <button onclick="clearAll()">Clear</button>

        <button onclick="copyResponse()">Copy</button>

        <button onclick="downloadResponse()">Download</button>

    </div>

    <!-- LOADER -->
    <div id="loader" class="thinking hidden">
        Assistant is thinking<span id="dots">.</span>
    </div>

    <!-- OUTPUT -->
    <div id="output" class="output-box">
        Assistant response will appear here...
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
