<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>READ-EASE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>READ-EASE</h1>
        <p>Simplify complex digital content easily.</p>

        <textarea id="inputText" placeholder="Paste your text here..."></textarea>

        <button id="simplifyBtn">Simplify Text</button>
        <button id="speakBtn">🔊 Speak Output</button>

        <div id="outputBox">
            <h3>Simplified Output:</h3>
            <p id="outputText"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
